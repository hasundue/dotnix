name: Issue monitor

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Optional issue number to process; leave empty to process all configured issues"
        required: false
        default: ""

permissions:
  contents: read
  issues: write

concurrency:
  group: issue-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ISSUE_NUMBER: ${{ github.event.inputs.issue_number || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check configured issue monitors
        run: python .github/scripts/issue_monitor.py
