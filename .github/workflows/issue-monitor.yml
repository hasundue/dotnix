name: Issue monitor

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: issue-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check issues with opencode
        run: |
          nix shell "github:anomalyco/opencode" -c bash <<'SCRIPT'
            for num in $(gh issue list --json number --jq '.[].number'); do
              opencode run \
                -f configs/home/opencode/prompts/check-issue-monitor.md \
                "$num"
            done
          SCRIPT
